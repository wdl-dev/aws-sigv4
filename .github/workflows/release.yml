name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  check:
    name: Verify tag and package
    runs-on: ubuntu-24.04
    outputs:
      dist-tag: ${{ steps.version.outputs.dist-tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Run tests
        run: npm test

      - name: Tag must match package.json version
        id: version
        run: |
          version="$(node -p 'require("./package.json").version')"
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match package version v${version}" >&2
            exit 1
          fi
          case "$version" in
            *-*) echo "dist-tag=next" >> "$GITHUB_OUTPUT" ;;
            *) echo "dist-tag=latest" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Check package contents
        run: npm pack --dry-run

  publish-npmjs:
    name: Publish to npmjs
    needs: check
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish to npmjs
        run: npm publish --ignore-scripts --provenance --access public --tag "$NPM_DIST_TAG"
        env:
          NPM_DIST_TAG: ${{ needs.check.outputs.dist-tag }}

  publish-github:
    name: Publish to GitHub Packages
    needs: check
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://npm.pkg.github.com
          scope: "@wdl-dev"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish to GitHub Packages
        run: npm publish --ignore-scripts --tag "$NPM_DIST_TAG"
        env:
          NPM_DIST_TAG: ${{ needs.check.outputs.dist-tag }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: [check, publish-npmjs, publish-github]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 == "## " ver { found=1; next }
            /^## / && found { exit }
            found { print }
          ' CHANGELOG.md > /tmp/notes.md
          args=(--verify-tag)
          if [ -s /tmp/notes.md ]; then
            args+=(--notes-file /tmp/notes.md)
          else
            args+=(--generate-notes)
          fi
          case "$version" in
            *-*) args+=(--prerelease) ;;
          esac
          gh release create "$GITHUB_REF_NAME" "${args[@]}"
