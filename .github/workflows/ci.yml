name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    # Keep this name in sync with release.yml required_jobs_json.
    name: Node 24
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Lint source
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        run: npm test

      - name: Check package contents
        run: npm pack --dry-run

  s3-aws-integration:
    # Keep this name in sync with release.yml required_jobs_json.
    name: Real AWS S3
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_SIGV4_S3_ROLE_ARN }}

      - name: Run real S3 integration test
        run: npm run test:integration:s3
        env:
          AWS_SIGV4_S3_INTEGRATION: aws
          AWS_SIGV4_S3_ENDPOINT: https://s3.us-east-1.amazonaws.com
          AWS_SIGV4_S3_REGION: us-east-1
          AWS_SIGV4_S3_BUCKET: ${{ secrets.AWS_SIGV4_S3_BUCKET }}
